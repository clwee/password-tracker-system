<!DOCTYPE html>
<html>
<head>
    <title>Update Master Password</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="page">
    <div class="card small">
        <h1>Update Master Password</h1>
        <p class="subtitle">Confirm your current password before setting a new one.</p>

        <form action="/change-password" method="post">
            <div class="form-group">
                <label>Current Password</label>
                <div class="password-input-group">
                    <input type="password" name="currentPassword" id="currentPassword" required>
                    <button type="button" class="mini-button" onclick="toggleInputPassword('currentPassword', this)">Show</button>
                </div>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <div class="password-input-group">
                    <input type="password" name="newPassword" id="newPassword" required>
                    <button type="button" class="mini-button" onclick="toggleInputPassword('newPassword', this)">Show</button>
                </div>
            </div>

            <button type="submit">Update Password</button>
        </form>

        <p class="message-error">[[${error}]]</p>
        <p class="message-success">[[${message}]]</p>

        <div class="actions">
            <a class="secondary-link" href="/entries">Back to Vault</a>
        </div>
    </div>
</div>

<script>
    function toggleInputPassword(inputId, button) {
        const input = document.getElementById(inputId);

        if (input.type === "password") {
            input.type = "text";
            button.textContent = "Hide";
        } else {
            input.type = "password";
            button.textContent = "Show";
        }
    }
</script>
</body>
</html>
